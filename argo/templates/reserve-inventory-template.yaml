apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: reserve-inventory-template
  labels:
    workflow: order-fulfillment
  annotations:
    workflows.argoproj.io/description: >
      Sub-workflow: Atomically reserves inventory for all items in an order.
      Creates reservation records and decrements available_quantity in a single
      transaction. Idempotent -- checks for existing reservations first.
spec:
  entrypoint: reserve-inventory
  arguments:
    parameters:
      - name: order-id
      - name: customer-id
        value: "unknown"
      - name: items
  templates:
    - name: reserve-inventory
      inputs:
        parameters:
          - name: order-id
            value: "{{workflow.parameters.order-id}}"
          - name: customer-id
            value: "{{workflow.parameters.customer-id}}"
          - name: items
            value: "{{workflow.parameters.items}}"
      outputs:
        parameters:
          - name: reservation-result
            valueFrom:
              path: /tmp/result.json
      retryStrategy:
        limit: "3"
        retryPolicy: Always
        backoff:
          duration: "2s"
          factor: "2"
          maxDuration: "30s"
      script:
        image: python:3.12-slim
        command: [sh, -c]
        source: |
          pip install psycopg2-binary --quiet 2>/dev/null && python3 <<'PYEOF'
          import json
          import os
          import sys
          import uuid
          from datetime import datetime, timezone

          import psycopg2

          order_id = "{{inputs.parameters.order-id}}"
          customer_id = "{{inputs.parameters.customer-id}}"
          items = json.loads('''{{inputs.parameters.items}}''')

          reservation_id = f"RES-{uuid.uuid4().hex[:12].upper()}"

          conn = psycopg2.connect(
              host=os.environ.get("PGHOST", "postgres"),
              port=int(os.environ.get("PGPORT", "5432")),
              dbname=os.environ.get("PGDATABASE", "orchestration"),
              user=os.environ.get("PGUSER", "orchestration"),
              password=os.environ.get("PGPASSWORD", "orchestration"),
          )

          try:
              cur = conn.cursor()

              # Check for existing reservation (idempotency)
              cur.execute(
                  "SELECT reservation_id FROM inventory_reservations WHERE order_id = %s AND status = 'reserved' LIMIT 1",
                  (order_id,),
              )
              existing = cur.fetchone()
              if existing:
                  result = {
                      "reservation_id": existing[0],
                      "items_reserved": [i["sku"] for i in items],
                      "reserved_at": datetime.now(timezone.utc).isoformat(),
                      "idempotent": True,
                  }
                  with open("/tmp/result.json", "w") as f:
                      json.dump(result, f)
                  print(f"Idempotent: reservation {existing[0]} already exists")
                  sys.exit(0)

              items_reserved = []
              for item in items:
                  sku = item["sku"]
                  quantity = item["quantity"]

                  cur.execute(
                      """
                      UPDATE inventory
                      SET available_quantity = available_quantity - %s,
                          reserved_quantity = reserved_quantity + %s
                      WHERE sku = %s AND available_quantity >= %s
                      RETURNING sku
                      """,
                      (quantity, quantity, sku, quantity),
                  )
                  if cur.fetchone() is None:
                      conn.rollback()
                      print(f"InsufficientStock: Cannot reserve {quantity} of {sku}", file=sys.stderr)
                      sys.exit(1)

                  cur.execute(
                      """
                      INSERT INTO inventory_reservations (reservation_id, order_id, sku, quantity, status)
                      VALUES (%s, %s, %s, %s, 'reserved')
                      """,
                      (f"{reservation_id}-{sku}", order_id, sku, quantity),
                  )
                  items_reserved.append(sku)

              # Create/update the order record
              total = sum(i["quantity"] * i.get("unit_price", 0) for i in items)
              cur.execute(
                  """
                  INSERT INTO orders (order_id, customer_id, total_amount, status)
                  VALUES (%s, %s, %s, 'reserved')
                  ON CONFLICT (order_id) DO UPDATE SET status = 'reserved', updated_at = NOW()
                  """,
                  (order_id, customer_id, total),
              )

              conn.commit()

              result = {
                  "reservation_id": reservation_id,
                  "items_reserved": items_reserved,
                  "reserved_at": datetime.now(timezone.utc).isoformat(),
              }
              with open("/tmp/result.json", "w") as f:
                  json.dump(result, f)
              print(f"Reserved inventory: {reservation_id} for order {order_id}")

          except Exception as e:
              conn.rollback()
              print(f"Error: {e}", file=sys.stderr)
              sys.exit(1)
          finally:
              conn.close()
          PYEOF
        env:
          - name: PGHOST
            value: "postgres"
          - name: PGPORT
            value: "5432"
          - name: PGDATABASE
            value: "orchestration"
          - name: PGUSER
            value: "orchestration"
          - name: PGPASSWORD
            value: "orchestration"
